include:
  - path: ./.docker/kafka/docker-compose.yml

services:
  gateway:
    container_name: ai-proxy-gateway
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      GATEWAY_SERVER_PORT: ${GATEWAY_SERVER_PORT:-8080}
    ports:
      - "${GATEWAY_SERVER_PORT:-8080}:${GATEWAY_SERVER_PORT:-8080}"
    depends_on:
      - postgres-master
    volumes:
      - .:/app
    entrypoint: sh -c "go run ./apps/gateway/main.go"
    restart: unless-stopped

  tenant:
    container_name: ai-proxy-tenant
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      TENANT_SERVER_PORT: ${TENANT_SERVER_PORT:-8082}
    ports:
      - "${TENANT_SERVER_PORT:-8082}:${TENANT_SERVER_PORT:-8082}"
    depends_on:
      - postgres-master
    volumes:
      - .:/app
    entrypoint: sh -c "go run ./apps/tenant/main.go"
    restart: unless-stopped

  guardrails:
    container_name: ai-proxy-guardrails
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      GUARDRAIL_SERVER_PORT: ${GUARDRAIL_SERVER_PORT:-8083}
    ports:
      - "${GUARDRAIL_SERVER_PORT:-8083}:${GUARDRAIL_SERVER_PORT:-8083}"
    depends_on:
      - postgres-master
    volumes:
      - .:/app
    entrypoint: sh -c "go run ./apps/guardrails/main.go"
    restart: unless-stopped

  observability:
    container_name: ai-proxy-observability
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      OBSERVABILITY_SERVER_PORT: ${OBSERVABILITY_SERVER_PORT:-8084}
    ports:
      - "${OBSERVABILITY_SERVER_PORT:-8084}:${OBSERVABILITY_SERVER_PORT:-8084}"
    depends_on:
      - postgres-master
    volumes:
      - .:/app
    entrypoint: sh -c "go run ./apps/observability/main.go"
    restart: unless-stopped

  postgres-master:
    container_name: ai-proxy-postgres-master
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      REPLICATION_USER: ${POSTGRES_USER}
      REPLICATION_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - "pg_master_data:/var/lib/postgresql/data"
      - .docker/postgres/master:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    container_name: ai-proxy-api
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    ports:
      - "8081:8081"
    depends_on:
      # - mysql-master
      # - mysql-replica
      - postgres-master
      # - postgres-replica
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: >
      sh -c "
        socat TCP-LISTEN:8080,fork,bind=127.0.0.1 TCP:host.docker.internal:8080 & reflex -c reflex.conf
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  pg_master_data:
