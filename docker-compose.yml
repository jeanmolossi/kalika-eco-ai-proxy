services:
  postgres-master:
    container_name: ai-proxy-postgres-master
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      REPLICATION_USER: ${POSTGRES_USER}
      REPLICATION_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - "pg_master_data:/var/lib/postgresql/data"
      - .docker/postgres/master:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    container_name: ai-proxy-api
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    ports:
      - "8081:8081"
    depends_on:
      # - mysql-master
      # - mysql-replica
      - postgres-master
      # - postgres-replica
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: >
      sh -c "
        socat TCP-LISTEN:8080,fork,bind=127.0.0.1 TCP:host.docker.internal:8080 & reflex -c reflex.conf
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  pg_master_data:
