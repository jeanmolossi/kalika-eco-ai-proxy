include:
  - path: ./.docker/kafka/docker-compose.yml

services:
  gateway:
    container_name: ai-proxy-gateway
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      GATEWAY_SERVER_PORT: ${GATEWAY_SERVER_PORT:-8080}
      GATEWAY_POSTGRES_DB: ${GATEWAY_POSTGRES_DB:-ai_proxy_gateway}
      SERVICES_TENANT_URL: https://tenant:${TENANT_SERVER_PORT:-8082}/api
      SERVICES_GUARDRAIL_URL: https://guardrails:${GUARDRAIL_SERVER_PORT:-8083}/api
      SERVICES_OBSERVABILITY_URL: https://observability:${OBSERVABILITY_SERVER_PORT:-8084}/api
      SERVICES_AUTH_TOKEN: ${SERVICES_AUTH_TOKEN:-dev-shared-secret}
    ports:
      - "${GATEWAY_SERVER_PORT:-8080}:${GATEWAY_SERVER_PORT:-8080}"
    depends_on:
      - postgres-master
    volumes:
      - .:/app
    entrypoint: >
      sh -c "reflex -r '\\.go$' -s -- sh -c 'go run ./apps/gateway/main.go'"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --cacert /app/cert.pem https://localhost:${GATEWAY_SERVER_PORT:-8080}/api/healthz || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  tenant:
    container_name: ai-proxy-tenant
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      TENANT_SERVER_PORT: ${TENANT_SERVER_PORT:-8082}
      TENANT_POSTGRES_DB: ${TENANT_POSTGRES_DB:-ai_proxy_tenant}
      SERVICES_AUTH_TOKEN: ${SERVICES_AUTH_TOKEN:-dev-shared-secret}
    ports:
      - "${TENANT_SERVER_PORT:-8082}:${TENANT_SERVER_PORT:-8082}"
    depends_on:
      - postgres-master
    volumes:
      - .:/app
    entrypoint: >
      sh -c "reflex -r '\\.go$' -s -- sh -c 'go run ./apps/tenant/main.go'"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --cacert /app/cert.pem https://localhost:${TENANT_SERVER_PORT:-8082}/api/healthz || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  guardrails:
    container_name: ai-proxy-guardrails
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
      environment:
        GUARDRAIL_SERVER_PORT: ${GUARDRAIL_SERVER_PORT:-8083}
        GUARDRAIL_POSTGRES_DB: ${GUARDRAIL_POSTGRES_DB:-ai_proxy_guardrails}
        SERVICES_TENANT_URL: https://tenant:${TENANT_SERVER_PORT:-8082}/api
        SERVICES_AUTH_TOKEN: ${SERVICES_AUTH_TOKEN:-dev-shared-secret}
    ports:
      - "${GUARDRAIL_SERVER_PORT:-8083}:${GUARDRAIL_SERVER_PORT:-8083}"
    depends_on:
      - postgres-master
    volumes:
      - .:/app
    entrypoint: >
      sh -c "reflex -r '\\.go$' -s -- sh -c 'go run ./apps/guardrails/main.go'"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --cacert /app/cert.pem https://localhost:${GUARDRAIL_SERVER_PORT:-8083}/api/healthz || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  observability:
    container_name: ai-proxy-observability
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      OBSERVABILITY_SERVER_PORT: ${OBSERVABILITY_SERVER_PORT:-8084}
      OBSERVABILITY_POSTGRES_DB: ${OBSERVABILITY_POSTGRES_DB:-ai_proxy_observability}
      SERVICES_AUTH_TOKEN: ${SERVICES_AUTH_TOKEN:-dev-shared-secret}
    ports:
      - "${OBSERVABILITY_SERVER_PORT:-8084}:${OBSERVABILITY_SERVER_PORT:-8084}"
    depends_on:
      - postgres-master
    volumes:
      - .:/app
    entrypoint: >
      sh -c "reflex -r '\\.go$' -s -- sh -c 'go run ./apps/observability/main.go'"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --cacert /app/cert.pem https://localhost:${OBSERVABILITY_SERVER_PORT:-8084}/api/healthz || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  postgres-master:
    container_name: ai-proxy-postgres-master
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      GATEWAY_POSTGRES_DB: ${GATEWAY_POSTGRES_DB:-ai_proxy_gateway}
      TENANT_POSTGRES_DB: ${TENANT_POSTGRES_DB:-ai_proxy_tenant}
      GUARDRAIL_POSTGRES_DB: ${GUARDRAIL_POSTGRES_DB:-ai_proxy_guardrails}
      OBSERVABILITY_POSTGRES_DB: ${OBSERVABILITY_POSTGRES_DB:-ai_proxy_observability}
      REPLICATION_USER: ${POSTGRES_USER}
      REPLICATION_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - "pg_master_data:/var/lib/postgresql/data"
      - .docker/postgres/master:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pg_master_data:
