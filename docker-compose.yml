services:
  api:
    container_name: ai-proxy-api
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    ports:
      - "8081:8081"
    # depends_on:
    # - mysql-master
    # - mysql-replica
    # - postgres-master
    # - postgres-replica
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: >
      sh -c "
        socat TCP-LISTEN:8080,fork,bind=127.0.0.1 TCP:host.docker.internal:8080 & reflex -c reflex.conf
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
